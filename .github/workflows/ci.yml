name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint and type-check
        run: npm run check

      - name: Build
        run: npm run build

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Verify tool test coverage mapping
        run: node scripts/check-tool-tests.mjs

      - name: Verify README and generated docs sync
        run: node scripts/check-readme-sync.mjs

      - name: Release readiness checklist exists
        run: test -f docs/operations/release-readiness-checklist.md
